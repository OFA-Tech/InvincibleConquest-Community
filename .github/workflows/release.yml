name: Build and Release Mod Jar

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean build

      - name: Collect release jar
        run: |
          mkdir -p release
          cp build/libs/*.jar release/
          rm -f release/*-sources.jar release/*-javadoc.jar release/*-dev.jar

      - name: List release files
        run: ls -lah release

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${GITHUB_REF_NAME}" release/*.jar \
            --title "Invincible: Conquest ${GITHUB_REF_NAME}" \
            --notes "NeoForge 1.21.1 mod release."
        env:
          GH_TOKEN: ${{ github.token }}
